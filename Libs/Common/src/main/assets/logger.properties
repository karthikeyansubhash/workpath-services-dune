# SDK Logging Configuration file
# It is sample logging configuration file
# To create logs, you have to create "logger.properties" file in the following path.
# /sdcard/Download/SDK/logger.properties

# Global properties
handlers = java.util.logging.FileHandler

# Default SDK logging level.
# This specifies which kinds of events are logged across all loggers.
# For any given facility this global level can be overridden by a facility specific level
.level= FINEST

# Here can set file output is in user's download directory
# pattern: saved logs file path
# limit: file size (byte) about each logs
# count: number of logs
# level: log level
# filter: filter string
SLog.FileHandler.pattern = {Download}/SDK/SDKlog_test_%g.log
SLog.FileHandler.limit = 512
SLog.FileHandler.count = 5
SLog.FileHandler.level = FINEST
# SLog.FileHandler.filter = Scanlet


